<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Newsletter — EnoGenAI</title>
</head>
<body>
  <form name="newsletter" method="POST" netlify data-netlify="true" netlify-honeypot="bot-field" action="/newsletter-thanks.html">
    <input type="hidden" name="form-name" value="newsletter" />
    <p hidden>
      <label>Don’t fill this out: <input name="bot-field" /></label>
    </p>
    <label>Email <input type="email" name="email" required /></label>
    <label>Nome <input name="name" /></label>
    <label>Azienda <input name="company" /></label>
    <button type="submit">Iscriviti</button>
  </form>
</body>
</html>
