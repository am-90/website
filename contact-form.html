<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form — EnoGenAI</title>
</head>
<body>
  <form name="contact" method="POST" netlify data-netlify="true" netlify-honeypot="bot-field" action="/thanks.html">
    <input type="hidden" name="form-name" value="contact" />
    <p hidden>
      <label>Don’t fill this out: <input name="bot-field" /></label>
    </p>
    <label>Nome e Cognome <input name="name" required /></label>
    <label>Email <input type="email" name="email" required /></label>
    <label>Cantina / Azienda <input name="company" /></label>
    <label>Messaggio <textarea name="message" required></textarea></label>
    <button type="submit">Invia</button>
  </form>
</body>
</html>
